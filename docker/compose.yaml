services:
  server:
    container_name: server
    build:
      context: .
      dockerfile: docker/server.Dockerfile
    env_file:
      - .env
    depends_on:
      - mongo
      - ai
  
  mongo:
    container_name: mongo
    image: mongo
    env_file:
      - .env
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD}
    restart: unless-stopped
    ports:
      - "${MONGO_PORT}:27017"
    volumes:
      - mongodb_data:/data/db

  ai:
    container_name: ai
    build:
      context: .
      dockerfile: docker/ai.Dockerfile
    env_file:
      - .env
    environment:
      - OLLAMA_FLASH_ATTENTION=1
      - OLLAMA_KV_CACHE_TYPE=q8_0
      - OLLAMA_CONTEXT_LENGTH=4096
      - OLLAMA_NUM_PARALLEL=4
      - OLLAMA_KEEP_ALIVE=-1
      - OLLAMA_MAX_QUEUE=512
      # - OLLAMA_GPU_OVERHEAD=4294967296
    ports:
      - "${OLLAMA_PORT}:11434"
    volumes:
      - ollama_data:/root/.ollama
      - ollama_data:/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
volumes:
  mongodb_data:
  ollama_data:
